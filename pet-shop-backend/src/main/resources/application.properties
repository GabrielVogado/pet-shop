# ===== HTTP =====
quarkus.http.port=8080

# ===== CORS (libera o frontend Vite em dev) =====
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,origin

# ===== Persistencia JNoSQL (MongoDB document) =====
# O JNoSQL usa o cliente MongoDB do Quarkus; configure a conexao por aqui.
quarkus.mongodb.connection-string=mongodb://localhost:27017
quarkus.mongodb.database=petcare
jnosql.document.database=petcare

# ===== Seguranca JWT (RS256) =====
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://petcare.local/issuer
smallrye.jwt.sign.key.location=privateKey.pem
# Tempo de expiracao do token (segundos)
petcare.jwt.duration=3600

# ===== OpenAPI / Swagger =====
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=false
quarkus.swagger-ui.path=/q/swagger-ui
mp.openapi.extensions.smallrye.info.title=PetCare Agenda API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=API de agendamento de banhos e vacinas para pets

# ===== Dev =====
quarkus.log.category."com.petcare".level=DEBUG

