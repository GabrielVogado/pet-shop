services:
  mongodb:
    image: mongo:7
    container_name: petcare-mongo
    ports:
      - "27017:27017"
    volumes:
      - petcare-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - petcare-net

  backend:
    build: ./pet-shop-backend
    container_name: petcare-backend
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # Override das configs do application.properties dentro do container
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://mongodb:27017
      QUARKUS_MONGODB_DATABASE: petcare
      JNOSQL_DOCUMENT_DATABASE: petcare
      QUARKUS_HTTP_CORS_ORIGINS: "http://localhost:8081,http://localhost:5173"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - petcare-net

  frontend:
    build:
      context: ./pet-shop-frontend
      args:
        # URL do backend acessada pelo NAVEGADOR (host), nao pela rede docker
        VITE_API_URL: "http://localhost:8080"
    container_name: petcare-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"
    networks:
      - petcare-net

volumes:
  petcare-mongo-data:

networks:
  petcare-net:
    driver: bridge
